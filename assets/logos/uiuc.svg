<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 110" width="320" height="110">
  <!-- Block I mark -->
  <g transform="translate(160,10)">
    <!-- Top bar -->
    <rect x="-18" y="0" width="36" height="7" fill="#E84A27"/>
    <!-- Stem -->
    <rect x="-7" y="7" width="14" height="22" fill="#E84A27"/>
    <!-- Bottom bar -->
    <rect x="-18" y="29" width="36" height="7" fill="#E84A27"/>
  </g>

  <!-- ILLINOIS -->
  <text x="160" y="62" font-family="'Arial Black', 'Arial', sans-serif" font-weight="900" font-size="22" fill="#13294B" text-anchor="middle" letter-spacing="3">ILLINOIS</text>

  <!-- Mechanical Science & Engineering -->
  <text x="160" y="80" font-family="Arial, sans-serif" font-weight="400" font-size="12.5" fill="#13294B" text-anchor="middle" letter-spacing="0.3">Mechanical Science &amp; Engineering</text>

  <!-- Divider line -->
  <line x1="60" y1="88" x2="260" y2="88" stroke="#13294B" stroke-width="0.75" opacity="0.4"/>

  <!-- GRAINGER COLLEGE OF ENGINEERING -->
  <text x="160" y="101" font-family="Arial, sans-serif" font-weight="700" font-size="9" fill="#13294B" text-anchor="middle" letter-spacing="1.5">GRAINGER COLLEGE OF ENGINEERING</text>
</svg>
